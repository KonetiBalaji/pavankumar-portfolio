<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavankumar Chilukoti — Data Scientist · AI/ML Engineer</title>
  <style>
    :root {
      --accent: #6366f1;
      --accent-tint: #eef2ff;
      --accent-dark: #4f46e5;
      --bg: #ffffff;
      --sidebar-bg: #f8fafc;
      --border: #e2e8f0;
      --text-heading: #0f172a;
      --text-body: #64748b;
      --text-muted: #94a3b8;
      --green-bg: #f0fdf4;
      --green-fg: #059669;
      --blue-bg: #eff6ff;
      --blue-fg: #2563eb;
      --orange-bg: #fff7ed;
      --orange-fg: #ea580c;
      --purple-bg: #faf5ff;
      --purple-fg: #7c3aed;
      --red-bg: #fef2f2;
      --red-fg: #dc2626;
      --gray-bg: #f1f5f9;
      --gray-fg: #475569;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-body);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 32px 20px;
      gap: 28px;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 48px 52px;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }

    /* ── SIDEBAR COMPONENTS ── */
    .sidebar-avatar {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      margin: 0 auto 12px;
    }

    .sidebar-name {
      text-align: center;
      color: var(--text-heading);
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .sidebar-title {
      text-align: center;
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      margin-top: 4px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-nav-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 0 10px;
      margin-bottom: 6px;
    }

    .sidebar-nav a {
      display: block;
      padding: 8px 12px;
      border-radius: 6px;
      color: var(--text-body);
      font-size: 12px;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: var(--accent-tint);
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar-contact {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-top: auto;
    }

    .sidebar-contact-label {
      font-size: 9px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .sidebar-contact a,
    .sidebar-contact span {
      font-size: 11px;
      color: var(--text-body);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      line-height: 1.4;
      word-break: break-all;
    }

    .sidebar-contact a { color: var(--accent); }
    .sidebar-contact a:hover { text-decoration: underline; }

    .btn-resume {
      display: block;
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }

    .btn-resume:hover { background: var(--accent-dark); }
  </style>
</head>
