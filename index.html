<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pavankumar Chilukoti — Data Scientist · AI/ML Engineer</title>
  <style>
    :root {
      --accent: #6366f1;
      --accent-tint: #eef2ff;
      --accent-dark: #4f46e5;
      --bg: #ffffff;
      --sidebar-bg: #f8fafc;
      --border: #e2e8f0;
      --text-heading: #0f172a;
      --text-body: #64748b;
      --text-muted: #94a3b8;
      --green-bg: #f0fdf4;
      --green-fg: #059669;
      --blue-bg: #eff6ff;
      --blue-fg: #2563eb;
      --orange-bg: #fff7ed;
      --orange-fg: #ea580c;
      --purple-bg: #faf5ff;
      --purple-fg: #7c3aed;
      --red-bg: #fef2f2;
      --red-fg: #dc2626;
      --gray-bg: #f1f5f9;
      --gray-fg: #475569;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text-body);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: 32px 20px;
      gap: 28px;
    }

    /* ── MAIN ── */
    .main {
      flex: 1;
      padding: 48px 52px;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 16px;
    }
  </style>
</head>
<body>

    <!-- filled in Task 2 -->
  </aside>

  <main class="main">
    <!-- filled in Tasks 3-9 -->
  </main>

  <script>

</body>
</html>
